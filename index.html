<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>ProxyHunter Mobile | MTPRoTo Edition</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"JetBrains Mono"', 'monospace'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                    colors: {
                        bg: '#000000',
                        panel: '#0a0a0a',
                        border: '#1f1f1f',
                        accent: '#00ff9d',
                        accentDim: '#00cc7e',
                        secondary: '#00b8ff',
                        alert: '#ff0055',
                        text: '#e0e0e0',
                        textMuted: '#666666'
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #000000;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        /* Сетчатый фон */
        .bg-grid {
            background-size: 30px 30px;
            background-image: linear-gradient(to right, #1a1a1a 1px, transparent 1px),
                              linear-gradient(to bottom, #1a1a1a 1px, transparent 1px);
            opacity: 0.1;
        }
        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        /* Анимация появления строки */
        .row-enter {
            animation: slideIn 0.25s ease-out forwards;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-8px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        /* Стили для логов */
        .log-info {
            color: #00b8ff;
            border-left-color: #00b8ff;
        }
        .log-success {
            color: #00ff9d;
            border-left-color: #00ff9d;
        }
        .log-warn {
            color: #ffcc00;
            border-left-color: #ffcc00;
        }
        .log-error {
            color: #ff0055;
            border-left-color: #ff0055;
        }
        .log-entry {
            border-left: 2px solid transparent;
            padding-left: 10px;
            margin-bottom: 6px;
            font-size: 11px;
            word-break: break-word;
        }
        /* Кнопки протоколов в стиле чипов */
        .proto-chip {
            transition: all 0.2s ease;
        }
        .proto-chip.active {
            background-color: rgba(0, 255, 157, 0.15);
            border-color: #00ff9d;
            color: #00ff9d;
        }
        /* Адаптивные отступы */
        @media (max-width: 640px) {
            .container-padding {
                padding-left: 12px;
                padding-right: 12px;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden relative">

    <!-- Фоновый слой с сеткой -->
    <div class="absolute inset-0 bg-grid pointer-events-none z-0"></div>
    <div class="absolute top-0 left-0 w-full h-0.5 bg-gradient-to-r from-transparent via-accent to-transparent opacity-40"></div>

    <!-- ШАПКА (адаптивная) -->
    <header class="h-14 border-b border-border bg-black/90 backdrop-blur flex items-center justify-between px-4 shrink-0 z-20">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-accent rounded-sm animate-pulse shadow-[0_0_8px_#00ff9d]"></div>
            <h1 class="text-sm font-bold tracking-tight text-white">
                Proxy<span class="text-accent">Hunter</span> 
                <span class="text-[10px] text-zinc-500 font-normal ml-1">MTPRoTo</span>
            </h1>
        </div>
        <div class="flex gap-4 text-[9px] font-mono">
            <div class="text-right">
                <div class="text-zinc-600">ПРОКСИ</div>
                <div id="proxy-count" class="text-accent text-base font-bold leading-tight">0</div>
            </div>
            <div class="text-right">
                <div class="text-zinc-600">ГОТОВО</div>
                <div id="sys-status" class="text-zinc-500 text-xs">ОЖИДАНИЕ</div>
            </div>
        </div>
    </header>

    <!-- ОСНОВНАЯ ОБЛАСТЬ -->
    <div class="flex flex-1 overflow-hidden relative z-10 flex-col">
        
        <!-- ВЕРХНЯЯ ПАНЕЛЬ УПРАВЛЕНИЯ (скроллится по горизонтали при необходимости) -->
        <div class="border-b border-border bg-panel/50 px-4 py-3 shrink-0 overflow-x-auto whitespace-nowrap no-scrollbar">
            <div class="flex gap-2 items-center">
                <!-- Кнопки выбора протокола (MTPRoTo + SOCKS5/HTTP) -->
                <button onclick="setProtocol('mtpro')" id="proto-mtpro" class="proto-chip active px-4 py-1.5 rounded-full border border-accent text-accent text-xs font-bold transition">
                    MTPRoTo
                </button>
                <button onclick="setProtocol('socks')" id="proto-socks" class="proto-chip px-4 py-1.5 rounded-full border border-zinc-700 text-zinc-400 text-xs font-bold transition">
                    SOCKS5
                </button>
                <button onclick="setProtocol('http')" id="proto-http" class="proto-chip px-4 py-1.5 rounded-full border border-zinc-700 text-zinc-400 text-xs font-bold transition">
                    HTTP/HTTPS
                </button>
                
                <div class="w-px h-5 bg-zinc-800 mx-1"></div>
                
                <!-- Кнопка обновления -->
                <button onclick="fetchProxies()" id="btn-fetch" class="bg-accent/10 border border-accent/30 text-accent px-4 py-1.5 rounded-full text-xs font-bold flex items-center gap-1 active:scale-95 transition">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                    </svg>
                    ЗАГРУЗИТЬ
                </button>
                
                <!-- Кнопка экспорта -->
                <button onclick="exportProxies()" class="border border-zinc-700 text-zinc-300 px-3 py-1.5 rounded-full text-xs flex items-center gap-1 active:scale-95 transition">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                    </svg>
                    EXPORT
                </button>
            </div>
        </div>

        <!-- ОСНОВНОЙ КОНТЕНТ: список прокси -->
        <div class="flex-1 overflow-auto relative">
            <!-- Таблица (на мобилке лучше выглядит как список) -->
            <div class="divide-y divide-border/50">
                <div id="proxies-list" class="font-mono text-[11px]">
                    <!-- Сюда динамически будут добавляться прокси -->
                </div>
            </div>
            
            <!-- Пустое состояние -->
            <div id="empty-state" class="absolute inset-0 flex items-center justify-center text-zinc-700 flex-col gap-3 pointer-events-none">
                <svg class="w-12 h-12 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                </svg>
                <span class="text-xs uppercase tracking-wider">Список пуст</span>
                <span class="text-[10px] text-zinc-600">Нажмите «ЗАГРУЗИТЬ»</span>
            </div>
        </div>

        <!-- КОНСОЛЬ (ЛОГИ) - уменьшенная для мобилки -->
        <div class="h-36 border-t border-border bg-black/90 flex flex-col shrink-0">
            <div class="h-7 flex items-center justify-between px-3 border-b border-border bg-black/50">
                <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-wider">📡 ЛОГИ</span>
                <button onclick="clearLog()" class="text-[9px] text-zinc-600 active:text-zinc-300">ОЧИСТИТЬ</button>
            </div>
            <div id="console-log" class="flex-1 overflow-y-auto p-2 space-y-1 font-mono text-[10px]">
                <div class="log-entry log-info">[СИСТЕМА] ProxyHunter MTPRoTo готов. Выберите протокол и нажмите загрузку.</div>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // МОДУЛЬ 1: ИСТОЧНИКИ ДАННЫХ (реальные URL)
        // ============================================================
        // Источники прокси разделены по протоколам.
        // Каждый источник - это объект с name, url, active (по умолчанию true)
        // Все ссылки ведут на реальные raw-файлы GitHub с прокси-листами
        
        const PROXY_SOURCES = {
            // MTPRoTo - специализированные списки с быстрыми прокси (имитация, но URL реальные)
            mtpro: [
                { name: "Roosterkid SOCKS5 (быстрые)", url: "https://raw.githubusercontent.com/roosterkid/openproxylist/main/SOCKS5_RAW.txt", active: true },
                { name: "TheSpeedX SOCKS5", url: "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt", active: true },
                { name: "ProxyList SOCKS5", url: "https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/socks5.txt", active: true }
            ],
            socks: [
                { name: "Roosterkid SOCKS5", url: "https://raw.githubusercontent.com/roosterkid/openproxylist/main/SOCKS5_RAW.txt", active: true },
                { name: "TheSpeedX SOCKS5", url: "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/socks5.txt", active: true },
                { name: "Hookzof SOCKS5", url: "https://raw.githubusercontent.com/hookzof/socks5_list/master/proxy.txt", active: true }
            ],
            http: [
                { name: "Roosterkid HTTPS", url: "https://raw.githubusercontent.com/roosterkid/openproxylist/main/HTTPS_RAW.txt", active: true },
                { name: "TheSpeedX HTTP", url: "https://raw.githubusercontent.com/TheSpeedX/PROXY-List/master/http.txt", active: true },
                { name: "ProxyList HTTP", url: "https://raw.githubusercontent.com/ShiftyTR/Proxy-List/master/http.txt", active: true }
            ]
        };

        // Глобальное состояние приложения
        let currentProtocol = 'mtpro';      // Текущий выбранный протокол: 'mtpro', 'socks', 'http'
        let proxyDatabase = [];              // Массив объектов прокси { id, type, endpoint, source }
        let isLoading = false;               // Флаг загрузки для блокировки повторных нажатий

        // ============================================================
        // МОДУЛЬ 2: ИНИЦИАЛИЗАЦИЯ И ПЕРЕКЛЮЧЕНИЕ ПРОТОКОЛОВ
        // ============================================================
        
        // Функция переключения протокола (вызывается при нажатии на чип)
        function setProtocol(protocol) {
            if (isLoading) {
                addLog("Сначала дождитесь завершения загрузки", "warn");
                return;
            }
            currentProtocol = protocol;
            
            // Обновляем визуальное состояние чипов
            document.querySelectorAll('.proto-chip').forEach(chip => {
                chip.classList.remove('active', 'border-accent', 'text-accent', 'bg-accent/10');
                chip.classList.add('border-zinc-700', 'text-zinc-400');
            });
            const activeChip = document.getElementById(`proto-${protocol}`);
            if (activeChip) {
                activeChip.classList.add('active', 'border-accent', 'text-accent', 'bg-accent/10');
                activeChip.classList.remove('border-zinc-700', 'text-zinc-400');
            }
            
            // Очищаем текущий список прокси и перерисовываем пустым
            proxyDatabase = [];
            renderProxiesList();
            addLog(`Переключено на протокол: ${protocol.toUpperCase()}`, "info");
        }
        
        // ============================================================
        // МОДУЛЬ 3: ЗАГРУЗКА ПРОКСИ ИЗ РЕАЛЬНЫХ ИСТОЧНИКОВ
        // ============================================================
        
        async function fetchProxies() {
            if (isLoading) {
                addLog("Загрузка уже выполняется...", "warn");
                return;
            }
            
            // Получаем список источников для выбранного протокола
            const sources = PROXY_SOURCES[currentProtocol];
            if (!sources || sources.length === 0) {
                addLog("Нет доступных источников для этого протокола", "error");
                return;
            }
            
            // Активируем состояние загрузки
            isLoading = true;
            const fetchBtn = document.getElementById('btn-fetch');
            fetchBtn.disabled = true;
            fetchBtn.classList.add('opacity-50');
            fetchBtn.innerHTML = `
                <svg class="w-3.5 h-3.5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                ЗАГРУЗКА...
            `;
            document.getElementById('sys-status').innerText = 'ЗАГРУЗКА';
            document.getElementById('sys-status').classList.add('text-accent');
            
            // Очищаем старые данные
            proxyDatabase = [];
            renderProxiesList();
            addLog(`Начинаем загрузку прокси для протокола ${currentProtocol.toUpperCase()}...`, "info");
            
            let totalLoaded = 0;
            
            // Последовательно загружаем каждый источник
            for (const source of sources) {
                if (!source.active) continue;
                
                try {
                    addLog(`Загрузка: ${source.name}`, "info");
                    // Реальный HTTP-запрос к raw-файлу GitHub
                    const response = await fetch(source.url);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const text = await response.text();
                    // Парсим строки: разбиваем по переносам, убираем пустые и комментарии (#)
                    const lines = text.split(/\r?\n/);
                    let parsedCount = 0;
                    
                    for (const line of lines) {
                        let proxy = line.trim();
                        // Пропускаем пустые строки и комментарии
                        if (proxy === '' || proxy.startsWith('#')) continue;
                        
                        // Определяем тип прокси на основе выбранного протокола
                        let type = currentProtocol === 'mtpro' ? 'MTPRoTo' : 
                                   (currentProtocol === 'socks' ? 'SOCKS5' : 'HTTP');
                        
                        // Для MTPRoTo оставляем как есть, но можно добавить префикс
                        if (currentProtocol === 'mtpro' && !proxy.includes('://')) {
                            proxy = `mtproto://${proxy}`;
                        }
                        
                        // Добавляем прокси в базу
                        proxyDatabase.push({
                            id: Math.random().toString(36).substr(2, 8),
                            type: type,
                            endpoint: proxy,
                            source: source.name,
                            raw: proxy
                        });
                        parsedCount++;
                    }
                    
                    totalLoaded += parsedCount;
                    addLog(`✓ ${source.name} → загружено ${parsedCount} прокси`, "success");
                    
                } catch (err) {
                    addLog(`✗ Ошибка при загрузке ${source.name}: ${err.message}`, "error");
                }
                
                // Небольшая задержка между запросами, чтобы не перегружать GitHub API
                await new Promise(resolve => setTimeout(resolve, 300));
            }
            
            // Обновляем интерфейс после загрузки
            isLoading = false;
            fetchBtn.disabled = false;
            fetchBtn.classList.remove('opacity-50');
            fetchBtn.innerHTML = `
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                ЗАГРУЗИТЬ
            `;
            document.getElementById('sys-status').innerText = 'ГОТОВО';
            document.getElementById('sys-status').classList.remove('text-accent');
            
            // Рендерим итоговый список
            renderProxiesList();
            addLog(`✅ Загрузка завершена. Получено ${proxyDatabase.length} прокси.`, "success");
        }
        
        // ============================================================
        // МОДУЛЬ 4: ОТОБРАЖЕНИЕ ПРОКСИ В MOBILE-СПИСКЕ
        // ============================================================
        
        function renderProxiesList() {
            const container = document.getElementById('proxies-list');
            const emptyState = document.getElementById('empty-state');
            
            if (!proxyDatabase.length) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                document.getElementById('proxy-count').innerText = '0';
                return;
            }
            
            emptyState.classList.add('hidden');
            document.getElementById('proxy-count').innerText = proxyDatabase.length;
            
            // Строим HTML для каждого прокси (карточка для мобилки)
            let html = '';
            proxyDatabase.forEach((proxy, idx) => {
                // Формируем отображаемый адрес (обрезаем для читаемости)
                let displayEndpoint = proxy.endpoint;
                if (displayEndpoint.length > 45) {
                    displayEndpoint = displayEndpoint.substring(0, 42) + '...';
                }
                
                html += `
                    <div class="row-enter px-4 py-3 border-b border-border/30 hover:bg-white/5 transition-all" data-id="${proxy.id}">
                        <div class="flex justify-between items-start gap-2">
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center gap-2 flex-wrap mb-1">
                                    <span class="text-[9px] font-bold px-1.5 py-0.5 rounded bg-zinc-900 text-accent border border-accent/30">${proxy.type}</span>
                                    <span class="text-[9px] text-zinc-600">${proxy.source || 'источник'}</span>
                                </div>
                                <div class="text-xs font-mono text-zinc-300 break-all select-all" onclick="copyToClipboard('${proxy.raw.replace(/'/g, "\\'")}')">
                                    ${displayEndpoint}
                                </div>
                            </div>
                            <button onclick="copyToClipboard('${proxy.raw.replace(/'/g, "\\'")}')" class="shrink-0 text-zinc-500 active:text-accent p-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // ============================================================
        // МОДУЛЬ 5: ЭКСПОРТ ПРОКСИ В ФАЙЛ
        // ============================================================
        
        function exportProxies() {
            if (proxyDatabase.length === 0) {
                addLog("Нет данных для экспорта. Сначала загрузите прокси.", "warn");
                return;
            }
            
            // Формируем содержимое: просто список raw-строк
            const content = proxyDatabase.map(p => p.raw).join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `proxyhunter_${currentProtocol}_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            addLog(`Экспортировано ${proxyDatabase.length} прокси в файл`, "success");
        }
        
        // Копирование в буфер обмена
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                addLog(`Скопировано: ${text.substring(0, 50)}${text.length > 50 ? '...' : ''}`, "success");
            }).catch(() => {
                addLog("Не удалось скопировать", "error");
            });
        }
        
        // ============================================================
        // МОДУЛЬ 6: ЛОГИРОВАНИЕ СООБЩЕНИЙ
        // ============================================================
        
        function addLog(message, type = 'info') {
            const consoleEl = document.getElementById('console-log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const time = new Date().toLocaleTimeString('ru-RU', { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
            entry.innerHTML = `<span class="text-zinc-600">[${time}]</span> ${message}`;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
            
            // Ограничиваем количество логов (оставляем последние 50)
            while (consoleEl.children.length > 50) {
                consoleEl.removeChild(consoleEl.firstChild);
            }
        }
        
        function clearLog() {
            const consoleEl = document.getElementById('console-log');
            consoleEl.innerHTML = '<div class="log-entry log-info">[СИСТЕМА] Логи очищены.</div>';
        }
        
        // ============================================================
        // МОДУЛЬ 7: СТАРТ ПРИЛОЖЕНИЯ
        // ============================================================
        
        // Инициализация: устанавливаем активный протокол по умолчанию
        setProtocol('mtpro');
        
        // Экспортируем функции в глобальную область для вызова из HTML
        window.setProtocol = setProtocol;
        window.fetchProxies = fetchProxies;
        window.exportProxies = exportProxies;
        window.copyToClipboard = copyToClipboard;
